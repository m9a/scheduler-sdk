syntax = "proto3";

package scheduler.v1;

option java_multiple_files = true;
option java_package = "com.scheduler.proto.v1";

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_QUEUED = 1;
  JOB_STATUS_STARTING = 2;
  JOB_STATUS_RUNNING = 3;
  JOB_STATUS_COMPLETED = 4;
  JOB_STATUS_FAILED = 5;
  JOB_STATUS_CANCELLED = 6;
  JOB_STATUS_KILLED = 7;
}

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_PENDING = 1;
  TASK_STATUS_RUNNING = 2;
  TASK_STATUS_COMPLETED = 3;
  TASK_STATUS_FAILED = 4;
  TASK_STATUS_SKIPPED = 5;
}

enum FailureReason {
  FAILURE_REASON_UNSPECIFIED = 0;
  FAILURE_REASON_HEARTBEAT_LOST = 1;
  FAILURE_REASON_PROCESS_TIMEOUT = 2;
  FAILURE_REASON_PROCESS_EXITED = 3;
  FAILURE_REASON_PROCESS_START_FAILED = 4;
}

message Task {
  string id = 1;
  string name = 2;
  int32 sequence_number = 3;
  TaskStatus status = 4;
}

message Job {
  string id = 1;
  string name = 2;

  // Docker image reference (e.g., registry.example.com/job:v1).
  string artifact_uri = 3;

  reserved 4;
  JobStatus status = 5;
  repeated Task tasks = 6;
  int32 priority = 7;
  int64 created_at_millis = 8;
  int64 started_at_millis = 9;
  int64 completed_at_millis = 10;
  string error_message = 11;
  map<string, string> params = 12;
  repeated InputFile input_files = 13;
  FailureReason failure_reason = 14;
  string failure_detail = 15;
}

message InputFile {
  string name = 1;
  oneof source {
    string uri = 2;
    bytes content = 3;
  }
}

message OutputFile {
  string name = 1;
  int64 size_bytes = 2;
}

message FileHeader {
  string name = 1;
  int64 size_bytes = 2;
}
