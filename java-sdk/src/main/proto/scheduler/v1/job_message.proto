syntax = "proto3";
package scheduler.v1;
option java_multiple_files = true;
option java_package = "com.scheduler.proto.job";

import "scheduler/v1/common.proto";

// Unified status update used on both the WebSocket leg (SDK -> Worker)
// and the gRPC leg (Worker -> Coordinator). The SDK populates task-level
// fields only; the worker adds job-level fields before forwarding.
//
// WebSocket frame: [0x01] [StatusUpdate bytes]
message StatusUpdate {
  string job_id = 1;

  // Task-level -- populated by SDK, forwarded by worker
  int32 task_index = 2;
  string task_name = 3;
  TaskStatus task_status = 4;
  string error_message = 5;
  int64 duration_ms = 6;
  string output = 7;

  // Job-level -- populated by worker before forwarding to coordinator
  JobStatus job_status = 8;
  FailureReason failure_reason = 9;
  string failure_detail = 10;
}
