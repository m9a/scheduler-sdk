# Self-contained control-plane stack launched by the CLI (InfraManager runs
# `docker compose up -d` directly). Unlike the scheduler repo's profile-gated
# template (driven by scripts/control-plane.sh), every service here starts
# unconditionally — the CLI is an all-in-one local launcher and waits on mlflow,
# so the stacks are NOT behind compose profiles. CLI-only extra: a local
# registry on 5050 for `docker push`. Coordinator/worker run on the host (the
# CLI spawns them as Java processes), not in this compose. Values fall back to
# the defaults below but honor env overrides for parity with the repo template.
services:

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - scheduler-net

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing local/scheduler;
      mc mb --ignore-existing local/mlflow;
      "
    networks:
      - scheduler-net

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - scheduler-net

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    depends_on:
      - postgres
      - minio
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    entrypoint: /bin/sh
    command:
      - -c
      - |
        pip install --no-cache-dir psycopg2-binary boto3 && \
        mlflow server \
          --host 0.0.0.0 \
          --port 5000 \
          --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow \
          --artifacts-destination s3://mlflow/ \
          --serve-artifacts
    networks:
      - scheduler-net

  registry:
    image: registry:2
    ports:
      - "5050:5000"
    networks:
      - scheduler-net

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "${PROMETHEUS_PORT:-9095}:9090"
    volumes:
      - ./metrics/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    # Coordinator/worker run on the host (the CLI launches them as Java processes) —
    # containers reach them via host.docker.internal (see metrics/prometheus.yml).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - scheduler-net

  grafana:
    image: grafana/grafana:11.1.0
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./metrics/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./metrics/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - scheduler-net

networks:
  scheduler-net:
    name: scheduler-net

volumes:
  minio-data:
  postgres-data:
