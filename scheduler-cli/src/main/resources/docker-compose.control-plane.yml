services:

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    networks:
      - scheduler-net

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing local/scheduler;
      mc mb --ignore-existing local/mlflow;
      "
    networks:
      - scheduler-net

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - scheduler-net

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    depends_on:
      - postgres
      - minio
    ports:
      - "5000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    entrypoint: /bin/sh
    command:
      - -c
      - |
        pip install --no-cache-dir psycopg2-binary boto3 && \
        mlflow server \
          --host 0.0.0.0 \
          --port 5000 \
          --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow \
          --artifacts-destination s3://mlflow/ \
          --serve-artifacts
    networks:
      - scheduler-net

  registry:
    image: registry:2
    ports:
      - "5050:5000"
    networks:
      - scheduler-net

networks:
  scheduler-net:
    name: scheduler-net

volumes:
  minio-data:
  postgres-data:
