coordinator:
  host: localhost
  port: 9090

hostname: host.docker.internal
port: 0

docker:
  network: scheduler-net

minio:
  endpoint: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucket: scheduler

mlflow:
  # Reachable from job containers on the docker network (used by the worker).
  trackingUri: http://mlflow:5000
  # Reachable from the host (used by the CLI readiness check).
  healthUrl: http://localhost:5000/health

registry:
  url: http://localhost:5050
